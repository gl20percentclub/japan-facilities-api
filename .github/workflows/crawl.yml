name: Crawl Facilities

on:
  schedule:
    # 毎週月曜 18:00 UTC（= JST 火曜 AM 3:00）
    - cron: '0 18 * * 1'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'ダウンロードをスキップしキャッシュを使う'
        type: boolean
        default: false
      fetch_i2fas:
        description: '厚労省 i2fas オープンデータを再取得する（ブラウザ自動化・時間がかかる）'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache crawl data
        uses: actions/cache@v4
        with:
          path: .cache
          key: bodik-cache-${{ github.run_id }}
          restore-keys: |
            bodik-cache-

      # 厚労省 i2fas オープンデータの取得（任意）。ブラウザ自動化のため手動 dispatch 時のみ。
      # 取得結果は .cache/i2fas に保存され、以降のクロールでキャッシュから読まれる。
      - name: Fetch i2fas open data (optional)
        if: github.event_name == 'workflow_dispatch' && inputs.fetch_i2fas
        run: |
          npx playwright install --with-deps chromium
          node scripts/fetch-i2fas.mjs
        continue-on-error: true

      - name: Crawl
        # 全ソース＋i2fas で施設が100万件超になりメモリを要するため、
        # Node のヒープ上限を引き上げる（GitHub Linux ランナーは 16GB RAM）。
        env:
          NODE_OPTIONS: --max-old-space-size=12288
        run: node scripts/crawl.js --allow-empty-sources ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '--dry-run' || '' }}

      # 全市区町村を結合した1本の配布用CSV（api/facilities-all.csv[.gz]）を生成する。
      # 市区町村名は normalize-japanese-addresses で名寄せ済み。gh-pages でそのまま配信される。
      - name: Build merged CSV
        env:
          NODE_OPTIONS: --max-old-space-size=12288
        run: |
          node scripts/build-city-normmap.js
          node scripts/build-merged-csv.js
          gzip -kf api/facilities-all.csv

      - name: Validate
        run: npm test

      # README の統計（件数・サイズ）だけを main に反映する。
      # 生成物 api/ は Git 管理せず（.gitignore）、配信は gh-pages のみで行う（履歴肥大を避けるため）。
      # クロール中に他の push で main が進むことがあるため、rebase してリトライする。
      - name: Commit README stats
        run: |
          if git diff --quiet README.md; then
            echo "README 変更なし"; exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: update README data stats"
          for i in 1 2 3; do
            if git pull --rebase --autostash origin main && git push; then
              echo "pushed"; exit 0
            fi
            echo "push retry $i..."; sleep 5
          done
          echo "::warning::README stats の push に失敗（gh-pages への配信は別ステップで実施）"

      # 生成した api/ を gh-pages へ配信する（データの唯一の配信先）。
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          exclude_assets: 'node_modules,.cache,scripts,.github'

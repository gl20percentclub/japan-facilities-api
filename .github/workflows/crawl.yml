name: Crawl Facilities

on:
  schedule:
    # 毎週月曜 18:00 UTC（= JST 火曜 AM 3:00）
    - cron: '0 18 * * 1'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'ダウンロードをスキップしキャッシュを使う'
        type: boolean
        default: false
      fetch_i2fas:
        description: '厚労省 i2fas オープンデータを再取得する（ブラウザ自動化・時間がかかる）'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache crawl data
        uses: actions/cache@v4
        with:
          path: .cache
          key: bodik-cache-${{ github.run_id }}
          restore-keys: |
            bodik-cache-

      # 厚労省 i2fas オープンデータの取得（任意）。ブラウザ自動化のため手動 dispatch 時のみ。
      # 取得結果は .cache/i2fas に保存され、以降のクロールでキャッシュから読まれる。
      - name: Fetch i2fas open data (optional)
        if: github.event_name == 'workflow_dispatch' && inputs.fetch_i2fas
        run: |
          npx playwright install --with-deps chromium
          node scripts/fetch-i2fas.mjs
        continue-on-error: true

      - name: Crawl
        run: node scripts/crawl.js ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '--dry-run' || '' }}

      - name: Validate
        run: npm test

      # 先に gh-pages へ配信する（orphan ブランチへの force push なので main の
      # 進行と競合しない＝後続の main コミットが失敗しても配信は成立する）。
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          exclude_assets: 'node_modules,.cache,scripts,.github'

      # 生成物 api/ と README 統計を main にコミットする。
      # クロール中に他の push で main が進むことがあるため、rebase してリトライする。
      - name: Commit data
        run: |
          if git diff --quiet api/ README.md; then
            echo "変更なし"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add api/ README.md
          git commit -m "chore: update facilities data"
          for i in 1 2 3; do
            if git pull --rebase --autostash origin main && git push; then
              echo "pushed"; exit 0
            fi
            echo "push retry $i..."; sleep 5
          done
          echo "::error::main への push に失敗（gh-pages への配信は完了しています）"
          exit 1

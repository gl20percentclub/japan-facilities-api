# 全国 食品営業許可 施設API — データソース定義（単一の設定ファイル）
#
# このファイル1つで「どこから・どうやって取得し、どの列をどう正規化するか」を定義する。
# crawl.js はここを読んで 取得(acquire) → パース → 正規化 → 出力 を行う。
#
# columns:  元データの列名(ヘッダー) → 内部キー の対応表（全ソース共通の別名辞書）。
#           自治体・年度でヘッダー表記が揺れるため、同じ内部キーに複数の元表記を並べてよい。
#           内部キーの意味は scripts/lib/normalize.js を参照。
#
# sources:  取得対象。1エントリ追加するだけで新しい自治体を取り込める。
#   key            一意キー（キャッシュ名・--only 指定に使用）
#   acquire        取得方法:
#     { type: ckan, ckanBase, resourceId }        CKAN resource_show でURL解決
#     { type: get,  url|urls, format?, encoding? } URLを直接GET（urls は複数結合）
#     { type: post, url, body, format? }           フォームPOSTで取得（京都市 等）
#     { type: resolve, pageUrl, linkPattern, format } 掲載ページのリンク文言から実URLを解決
#     { type: i2fasglob }                          .cache/i2fas/*.csv を一括取込（厚労省 i2fas）
#     format:   csv | tsv | xlsx | xls（省略時はURL/CKAN情報から推定）
#     encoding: utf-8 | shift_jis | utf-16 | auto（既定 auto）
#   source         出典表示名（attribution）
#   sourceUrl      出典の掲載ページURL（引用用。取得URL acquire.url とは別）
#   license        ライセンス表記（"要確認" は未確定＝掲載ページに明示なし）
#   defaultPref    都道府県カラムが無いデータの既定都道府県
#   defaultCity    市区町村カラムが無いデータの既定市区町村
#   allSheets      Excel全シートを結合（京都市: 区ごとシート）
#   locateByAddress 市区町村カラムを信用せず施設住所から導出（i2fas: カラムは管轄自治体）
#
# BODIK 掲載分は scripts/gen-bodik-sources.mjs で sources へ追記再生成できる。

